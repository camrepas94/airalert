<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 212 36" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="airalertIconStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="32%" stop-color="#5b9cff"/>
      <stop offset="62%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <!-- Frosted glass screen: teal highlight → blue → deep violet → near-black -->
    <linearGradient id="airalertIconFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bae6fd" stop-opacity="0.34"/>
      <stop offset="28%" stop-color="#5b9cff" stop-opacity="0.2"/>
      <stop offset="55%" stop-color="#7c3aed" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0a0618" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="airalertIconInnerGloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="airalertIconRimLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="airalertWordAir" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#f4f7fc"/>
      <stop offset="45%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="airalertWordAlert" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="45%" stop-color="#7dd3fc"/>
      <stop offset="78%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="airalertIconGlow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.1" result="b1"/>
      <feFlood flood-color="#22d3ee" flood-opacity="0.42" result="f1"/>
      <feComposite in="f1" in2="b1" operator="in" result="g1"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="b2"/>
      <feFlood flood-color="#e879f9" flood-opacity="0.32" result="f2"/>
      <feComposite in="f2" in2="b2" operator="in" result="g2"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="b3"/>
      <feFlood flood-color="#5b9cff" flood-opacity="0.22" result="f3"/>
      <feComposite in="f3" in2="b3" operator="in" result="g3"/>
      <feMerge>
        <feMergeNode in="g3"/>
        <feMergeNode in="g2"/>
        <feMergeNode in="g1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="airalertWordGlow" x="-18%" y="-45%" width="136%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.85" result="b"/>
      <feFlood flood-color="#22d3ee" flood-opacity="0.4" result="f1"/>
      <feComposite in="f1" in2="b" operator="in" result="g1"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.6" result="b2"/>
      <feFlood flood-color="#e879f9" flood-opacity="0.22" result="f2"/>
      <feComposite in="f2" in2="b2" operator="in" result="g2"/>
      <feMerge>
        <feMergeNode in="g2"/>
        <feMergeNode in="g1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(0, 4)" filter="url(#airalertIconGlow)">
    <path
      d="M 7 11 C 6 6 4.5 2.5 2.5 0.5 M 25 11 C 26 6 27.5 2.5 29.5 0.5"
      stroke="url(#airalertIconStroke)"
      stroke-width="1.85"
      stroke-linecap="round"
    />
    <rect
      x="1"
      y="10"
      width="30"
      height="19"
      rx="3.5"
      stroke="url(#airalertIconStroke)"
      stroke-width="2"
      fill="url(#airalertIconFill)"
    />
    <!-- Inner glass highlight (top edge) -->
    <rect x="2.5" y="11.2" width="27" height="7" rx="2" fill="url(#airalertIconInnerGloss)"/>
    <!-- Subtle inner rim -->
    <rect
      x="2.3"
      y="11"
      width="27.4"
      height="17"
      rx="2.8"
      fill="none"
      stroke="url(#airalertIconRimLight)"
      stroke-width="0.65"
      opacity="0.85"
    />
    <g stroke="#67e8f9" stroke-opacity="0.38" stroke-width="0.95" stroke-linecap="round">
      <line x1="5" y1="15" x2="27" y2="15"/>
      <line x1="5" y1="18.5" x2="27" y2="18.5"/>
      <line x1="5" y1="22" x2="24" y2="22"/>
    </g>
    <circle cx="27.5" cy="13" r="4.8" fill="none" stroke="#22d3ee" stroke-opacity="0.28" stroke-width="0.55"/>
    <circle cx="27.5" cy="13" r="3.6" fill="none" stroke="#f472b6" stroke-opacity="0.5" stroke-width="0.65"/>
    <circle cx="27.5" cy="13" r="2.85" fill="#fbcfe8"/>
    <circle cx="27.5" cy="13" r="1.35" fill="#ffffff" fill-opacity="0.55"/>
  </g>
  <g font-family="system-ui, -apple-system, 'Segoe UI', Inter, Roboto, sans-serif" font-size="21" font-weight="700" letter-spacing="-0.055em" filter="url(#airalertWordGlow)">
    <text x="38" y="26" fill="url(#airalertWordAir)">Air</text>
    <text x="71" y="26" fill="url(#airalertWordAlert)">alert</text>
  </g>
</svg>
