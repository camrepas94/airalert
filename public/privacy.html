<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <title>AirAlert — Privacy Policy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/legal/legal-doc-prose.css" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(ellipse 120% 80% at 50% 0%, rgba(34, 211, 238, 0.12), transparent 55%), #050508;
        color: #e8f0ff;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .legal-standalone-top {
        max-width: 42rem;
        margin: 0 auto;
        padding: 1.25rem 1.15rem 0.5rem;
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        justify-content: space-between;
        gap: 0.75rem;
      }
      .legal-standalone-top h1 {
        margin: 0;
        font-size: clamp(1.35rem, 1.1rem + 1vw, 1.75rem);
        font-weight: 750;
        letter-spacing: 0.02em;
      }
      .legal-standalone-top a {
        color: #7dd3fc;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.92rem;
      }
      .legal-standalone-top a:hover {
        text-decoration: underline;
      }
      main {
        max-width: 42rem;
        margin: 0 auto;
        padding: 0 1.15rem 2.5rem;
        padding-bottom: calc(2.5rem + env(safe-area-inset-bottom));
      }
      .legal-doc-standalone {
        padding-top: 0.25rem;
      }
    </style>
  </head>
  <body>
    <header class="legal-standalone-top">
      <h1>Privacy Policy</h1>
      <a href="/">← AirAlert</a>
    </header>
    <main class="legal-doc-scroll legal-doc-standalone" id="legalStandaloneRoot">
      <p class="muted legal-doc-loading">Loading…</p>
    </main>
    <script>
      (function () {
        var root = document.getElementById("legalStandaloneRoot");
        if (!root) return;
        fetch("/legal/privacy-body.html", { credentials: "same-origin" })
          .then(function (r) {
            if (!r.ok) throw new Error("load failed");
            return r.text();
          })
          .then(function (html) {
            root.innerHTML = html;
          })
          .catch(function () {
            root.innerHTML =
              '<p class="msg err">Could not load the policy. Check your connection and try again, or open the app from the home link above.</p>';
          });
      })();
    </script>
  </body>
</html>
