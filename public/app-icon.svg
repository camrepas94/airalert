<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">AirAlert icon placeholder</title>
  <desc id="desc">A neon television alert mark for AirAlert.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="900" y2="940" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071126"/>
      <stop offset="0.5" stop-color="#121036"/>
      <stop offset="1" stop-color="#050508"/>
    </linearGradient>
    <linearGradient id="mark" x1="236" y1="248" x2="812" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.48" stop-color="#5b9cff"/>
      <stop offset="1" stop-color="#e879f9"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.83 0 0 0 0 0.93 0 0 0 0.75 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <circle cx="794" cy="226" r="150" fill="#e879f9" opacity="0.16"/>
  <circle cx="250" cy="800" r="180" fill="#22d3ee" opacity="0.14"/>
  <g filter="url(#glow)">
    <rect x="236" y="306" width="552" height="370" rx="72" fill="none" stroke="url(#mark)" stroke-width="54"/>
    <path d="M344 742h336" fill="none" stroke="url(#mark)" stroke-width="54" stroke-linecap="round"/>
    <path d="M432 252l80-92 80 92" fill="none" stroke="url(#mark)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M650 430c62 48 62 124 0 172M574 470c28 24 28 68 0 92" fill="none" stroke="#eef2ff" stroke-width="44" stroke-linecap="round"/>
  </g>
</svg>
