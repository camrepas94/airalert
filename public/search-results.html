<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>Search results — AirAlert</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #050508;
        --panel: rgba(10, 12, 20, 0.74);
        --panel-solid: #0e1018;
        --text: #f4f7fc;
        --muted: #8a9bb8;
        --accent: #5b9cff;
        --accent-hot: #8ecbff;
        --accent-soft: rgba(91, 156, 255, 0.3);
        --neon-cyan: #22d3ee;
        --neon-magenta: #e879f9;
        --border: rgba(130, 200, 255, 0.11);
        --border-strong: rgba(140, 210, 255, 0.22);
        --danger: #ff7b86;
        --inset: rgba(0, 0, 0, 0.48);
        --shadow-card: 0 4px 32px rgba(0, 0, 0, 0.52), 0 0 48px -16px rgba(34, 211, 238, 0.14),
          0 0 72px -24px rgba(124, 92, 255, 0.12);
        --shadow-lift: 0 1px 0 rgba(255, 255, 255, 0.08) inset, 0 0 0 1px rgba(34, 211, 238, 0.06) inset;
        --panel-glow-blue: -8px 0 42px -12px rgba(91, 156, 255, 0.34), 8px 0 42px -12px rgba(91, 156, 255, 0.34),
          -4px 0 28px -10px rgba(91, 156, 255, 0.2), 4px 0 28px -10px rgba(91, 156, 255, 0.2);
        --font: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html {
        background: var(--bg);
        max-width: 100%;
        overflow-x: hidden;
        overscroll-behavior-x: none;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      body {
        margin: 0;
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        min-height: 100vh;
        max-width: 100%;
        overflow-x: hidden;
        overscroll-behavior-x: none;
        touch-action: pan-y;
        position: relative;
        isolation: isolate;
      }
      body::before,
      body::after {
        content: "";
        position: fixed;
        pointer-events: none;
        z-index: -1;
        border-radius: 50%;
        filter: blur(110px);
        opacity: 0.48;
      }
      body::before {
        width: min(90vw, 560px);
        height: min(90vw, 560px);
        top: -14%;
        right: -20%;
        background: radial-gradient(circle, rgba(124, 92, 255, 0.42) 0%, rgba(232, 121, 249, 0.12) 45%, transparent 70%);
      }
      body::after {
        width: min(80vw, 500px);
        height: min(80vw, 500px);
        bottom: -10%;
        left: -24%;
        background: radial-gradient(circle, rgba(34, 211, 238, 0.32) 0%, rgba(91, 156, 255, 0.14) 50%, transparent 68%);
      }
      main {
        position: relative;
        z-index: 0;
        max-width: 720px;
        margin: 0 auto;
        padding: 1.75rem 1.1rem 3.5rem;
      }
      .top-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 1.25rem;
      }
      .top-nav h1 {
        font-size: 1.25rem;
        font-weight: 650;
        margin: 0;
        letter-spacing: -0.02em;
      }
      a.home-link {
        display: inline-block;
        background: rgba(20, 28, 48, 0.55);
        color: var(--text);
        text-decoration: none;
        border-radius: 10px;
        border: 1px solid rgba(130, 200, 255, 0.18);
        padding: 0.58rem 1rem;
        font-size: 0.95rem;
        font-weight: 600;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06) inset, 0 0 24px -8px rgba(34, 211, 238, 0.08);
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      a.home-link:hover {
        background: rgba(30, 42, 68, 0.65);
        border-color: rgba(140, 210, 255, 0.28);
        filter: none;
      }
      .query-summary {
        color: rgba(154, 184, 224, 0.9);
        font-size: 0.9rem;
        margin: 0 0 1rem;
      }
      .query-summary strong {
        color: var(--text);
        font-weight: 600;
      }
      section {
        background: var(--panel);
        -webkit-backdrop-filter: blur(22px) saturate(1.15);
        backdrop-filter: blur(22px) saturate(1.15);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-right: 3px solid var(--accent);
        border-radius: 16px;
        padding: 1.15rem 1.2rem;
        margin-bottom: 1rem;
        box-shadow: var(--shadow-lift), var(--shadow-card), var(--panel-glow-blue);
      }
      @supports not ((-webkit-backdrop-filter: blur(1px)) or (backdrop-filter: blur(1px))) {
        section {
          background: var(--panel-solid);
        }
      }
      h2 {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--accent-hot);
        margin: 0 0 0.75rem;
        font-weight: 600;
      }
      .search-loading {
        font-size: 0.9rem;
        color: var(--muted);
      }
      .msg.err {
        color: var(--danger);
        font-size: 0.9rem;
        margin: 0 0 0.75rem;
      }
      .search-card {
        border: 1px solid rgba(130, 200, 255, 0.14);
        border-left: 2px solid rgba(91, 156, 255, 0.65);
        border-right: 2px solid rgba(91, 156, 255, 0.65);
        border-radius: 14px;
        padding: 0.85rem;
        margin-bottom: 0.7rem;
        background: rgba(4, 8, 18, 0.45);
        -webkit-backdrop-filter: blur(14px) saturate(1.1);
        backdrop-filter: blur(14px) saturate(1.1);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06) inset, 0 0 0 1px rgba(34, 211, 238, 0.05) inset,
          0 6px 24px rgba(0, 0, 0, 0.35), 0 0 40px -12px rgba(91, 156, 255, 0.12),
          -4px 0 18px -8px rgba(91, 156, 255, 0.12), 4px 0 18px -8px rgba(91, 156, 255, 0.12);
      }
      .search-card-inner {
        display: flex;
        gap: 0.75rem;
        align-items: flex-start;
      }
      .search-thumb {
        width: 56px;
        height: 78px;
        object-fit: cover;
        border-radius: 6px;
        flex-shrink: 0;
        background: var(--border);
      }
      .search-thumb.placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.65rem;
        color: var(--muted);
        text-align: center;
        padding: 0.25rem;
        line-height: 1.2;
      }
      .search-card-main {
        flex: 1;
        min-width: 0;
      }
      .search-card-title {
        font-weight: 650;
        font-size: 1rem;
        margin: 0 0 0.2rem;
        line-height: 1.3;
        color: #e8f0ff;
      }
      .search-card-meta {
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 0.5rem;
      }
      .search-card-meta .net {
        color: var(--accent);
        font-weight: 500;
      }
      button {
        cursor: pointer;
        border: 1px solid rgba(142, 203, 255, 0.35);
        border-radius: 10px;
        padding: 0.58rem 1rem;
        font-size: 0.95rem;
        font-weight: 600;
        font-family: inherit;
        background: linear-gradient(180deg, var(--accent-hot) 0%, var(--accent) 38%, #3d7ae8 100%);
        color: #030508;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.28) inset, 0 4px 16px rgba(34, 211, 238, 0.18),
          0 8px 28px rgba(91, 156, 255, 0.35);
        transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      }
      button:hover:not(:disabled) {
        transform: translateY(-1px);
        filter: brightness(1.05);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.32) inset, 0 6px 22px rgba(34, 211, 238, 0.22),
          0 12px 36px rgba(91, 156, 255, 0.42);
      }
      button:active:not(:disabled) {
        transform: translateY(0);
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .btn-subscribe-inline {
        margin-top: 0.15rem;
      }
      .search-post-toolbar {
        display: none;
        flex-wrap: wrap;
        align-items: flex-end;
        gap: 0.75rem 1rem;
        margin: 0 0 0.75rem;
        padding: 0.75rem 0.85rem;
        background: rgba(255, 255, 255, 0.03);
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.04) inset;
      }
      .search-post-toolbar.visible {
        display: flex;
      }
      .search-post-field label {
        display: block;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin-bottom: 0.25rem;
        font-weight: 600;
      }
      .search-post-field select {
        min-width: 10rem;
        padding: 0.45rem 0.55rem;
        border-radius: 8px;
        border: 1px solid var(--border-strong);
        background: var(--inset);
        color: var(--text);
        font-size: 0.9rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25) inset;
      }
      .search-pagination {
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem 0.75rem;
        margin-top: 0.35rem;
        font-size: 0.85rem;
      }
      .search-page-nav {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        flex-wrap: wrap;
      }
      .search-page-nav button {
        padding: 0.35rem 0.65rem;
        font-size: 0.85rem;
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.05) inset;
      }
      .search-page-nav button:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.11);
        filter: none;
        transform: none;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.08) inset;
      }
      .search-page-nav button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="top-nav">
        <h1 id="pageTitle">Search results</h1>
        <a class="home-link" href="/">← Home</a>
      </div>
      <p class="query-summary" id="querySummary"></p>

      <section>
        <h2>Results</h2>
        <p class="search-loading" id="loading">Loading…</p>
        <p class="msg err" id="err" style="display: none"></p>
        <div id="searchPostToolbar" class="search-post-toolbar">
          <div class="search-post-field">
            <label for="searchNetworkFilter">Filter by network</label>
            <select id="searchNetworkFilter" aria-label="Filter results by network">
              <option value="">All networks</option>
            </select>
          </div>
          <div class="search-post-field">
            <label for="searchPageSize">Results per page</label>
            <select id="searchPageSize" aria-label="Results per page">
              <option value="10">10</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
          <div class="search-pagination" id="searchPagination"></div>
        </div>
        <div id="results"></div>
      </section>
    </main>

    <script>
      const LS_USER = "airalert_user_id";

      function apiOrigin() {
        if (window.location.protocol === "file:") {
          return "http://127.0.0.1:3000";
        }
        return window.location.origin;
      }

      const api = (path, opts = {}) => {
        const url = path.startsWith("http") ? path : new URL(path, apiOrigin()).href;
        const { headers: userHeaders, ...rest } = opts;
        return fetch(url, {
          credentials: "include",
          ...rest,
          headers: {
            ...(rest.body != null ? { "Content-Type": "application/json" } : {}),
            ...userHeaders,
          },
        }).then(async (r) => {
          const data = await r.json().catch(() => ({}));
          if (!r.ok) {
            const msg = data.error || data.message || r.statusText;
            throw new Error(msg + " (HTTP " + r.status + ")");
          }
          return data;
        });
      };

      function isStaleUserError(e) {
        const m = e && e.message ? String(e.message) : "";
        return m.includes("User not found");
      }

      async function ensureUser() {
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        try {
          const me = await api("/api/users/me");
          if (me && me.id) {
            localStorage.setItem(LS_USER, me.id);
            return me.id;
          }
        } catch (e) {
          const m = String(e && e.message ? e.message : "");
          if (!/\(HTTP 401\)/.test(m)) throw e;
        }
        const u = await api("/api/users/bootstrap", {
          method: "POST",
          body: JSON.stringify({ timezone: tz }),
        });
        localStorage.setItem(LS_USER, u.id);
        return u.id;
      }

      const LS_SEARCH_PAGE_SIZE = "airalert_search_page_size";

      let searchResultState = { allShows: [], page: 1 };

      function appendSearchResultCard(box, s, userId, errEl) {
        const card = document.createElement("div");
        card.className = "search-card";
        const inner = document.createElement("div");
        inner.className = "search-card-inner";

        if (s.image) {
          const img = document.createElement("img");
          img.className = "search-thumb";
          img.src = s.image;
          img.alt = "";
          inner.appendChild(img);
        } else {
          const ph = document.createElement("div");
          ph.className = "search-thumb placeholder";
          ph.textContent = "No art";
          inner.appendChild(ph);
        }

        const main = document.createElement("div");
        main.className = "search-card-main";

        const titleRow = document.createElement("div");
        titleRow.className = "search-card-title";
        titleRow.textContent = s.name;
        main.appendChild(titleRow);

        const meta = document.createElement("div");
        meta.className = "search-card-meta";
        const parts = [];
        if (s.network) parts.push(s.network);
        if (s.premiered) parts.push(String(s.premiered).slice(0, 4));
        if (s.lastAiredDate) parts.push("Last aired " + s.lastAiredDate);
        meta.textContent = parts.length ? parts.join(" · ") : "Network / year unknown";
        main.appendChild(meta);

        const subBtn = document.createElement("button");
        subBtn.type = "button";
        subBtn.className = "btn-subscribe-inline";
        subBtn.textContent = "Subscribe";
        subBtn.addEventListener("click", async () => {
          subBtn.disabled = true;
          const postSub = (uid) =>
            api("/api/users/" + encodeURIComponent(uid) + "/subscriptions", {
              method: "POST",
              body: JSON.stringify({ tvmazeShowId: s.id, addedFrom: "search" }),
            });
          try {
            await postSub(userId);
          } catch (e) {
            if (isStaleUserError(e)) {
              localStorage.removeItem(LS_USER);
              try {
                const newId = await ensureUser();
                await postSub(newId);
              } catch (e2) {
                errEl.style.display = "block";
                errEl.textContent = e2.message;
                subBtn.disabled = false;
                return;
              }
            } else {
              errEl.style.display = "block";
              errEl.textContent = e.message;
              subBtn.disabled = false;
              return;
            }
          }
          subBtn.textContent = "Subscribed";
          card.style.opacity = "0.55";
        });
        main.appendChild(subBtn);

        inner.appendChild(main);
        card.appendChild(inner);
        box.appendChild(card);
      }

      function populateNetworkFilterOptions() {
        const sel = document.getElementById("searchNetworkFilter");
        const prev = sel.value;
        const list = searchResultState.allShows;
        const named = [...new Set(list.map((s) => s.network).filter(Boolean))].sort((a, b) =>
          a.localeCompare(b),
        );
        const hasUnknown = list.some((s) => !s.network);
        sel.innerHTML = "";
        const all = document.createElement("option");
        all.value = "";
        all.textContent = "All networks";
        sel.appendChild(all);
        if (hasUnknown) {
          const o = document.createElement("option");
          o.value = "__none__";
          o.textContent = "No network listed";
          sel.appendChild(o);
        }
        for (const n of named) {
          const o = document.createElement("option");
          o.value = n;
          o.textContent = n;
          sel.appendChild(o);
        }
        const ok = [...sel.options].some((o) => o.value === prev);
        sel.value = ok ? prev : "";
      }

      function getNetworkFilteredShows() {
        const v = document.getElementById("searchNetworkFilter").value;
        if (v === "__none__") return searchResultState.allShows.filter((s) => !s.network);
        if (v) return searchResultState.allShows.filter((s) => (s.network || "") === v);
        return searchResultState.allShows;
      }

      function renderSearchPage(userId, errEl) {
        const box = document.getElementById("results");
        const pagEl = document.getElementById("searchPagination");
        const filtered = getNetworkFilteredShows();
        let pageSize = Number(document.getElementById("searchPageSize").value);
        if (![10, 50, 100].includes(pageSize)) pageSize = 10;
        let page = searchResultState.page || 1;
        const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
        page = Math.min(Math.max(1, page), totalPages);
        searchResultState.page = page;
        const start = (page - 1) * pageSize;
        const slice = filtered.slice(start, start + pageSize);

        box.innerHTML = "";
        for (const s of slice) {
          appendSearchResultCard(box, s, userId, errEl);
        }

        pagEl.innerHTML = "";
        const summary = document.createElement("span");
        summary.style.color = "var(--muted)";
        if (!filtered.length) {
          summary.textContent = "No matches for this filter.";
        } else {
          const end = Math.min(page * pageSize, filtered.length);
          summary.textContent = "Showing " + (start + 1) + "–" + end + " of " + filtered.length;
        }
        pagEl.appendChild(summary);
        if (totalPages > 1) {
          const nav = document.createElement("div");
          nav.className = "search-page-nav";
          const prevB = document.createElement("button");
          prevB.type = "button";
          prevB.textContent = "Previous";
          prevB.disabled = page <= 1;
          prevB.addEventListener("click", () => {
            searchResultState.page = page - 1;
            renderSearchPage(userId, errEl);
          });
          const nextB = document.createElement("button");
          nextB.type = "button";
          nextB.textContent = "Next";
          nextB.disabled = page >= totalPages;
          nextB.addEventListener("click", () => {
            searchResultState.page = page + 1;
            renderSearchPage(userId, errEl);
          });
          nav.appendChild(prevB);
          nav.appendChild(document.createTextNode(" Page " + page + " / " + totalPages + " "));
          nav.appendChild(nextB);
          pagEl.appendChild(nav);
        }
      }

      (async function () {
        const params = new URLSearchParams(window.location.search);
        const title = (params.get("title") || "").trim();
        const legacyQ = (params.get("q") || "").trim();
        const summaryEl = document.getElementById("querySummary");
        const loadingEl = document.getElementById("loading");
        const errEl = document.getElementById("err");
        const toolbar = document.getElementById("searchPostToolbar");

        if (!title && !legacyQ) {
          loadingEl.style.display = "none";
          summaryEl.innerHTML =
            "No search terms in the URL. Use <strong>Search</strong> on the home page, or <a href=\"/\" style=\"color:var(--accent)\">go home</a>.";
          return;
        }

        summaryEl.textContent = "";
        const frag = document.createDocumentFragment();
        const qDisplay = title || legacyQ;
        const b = document.createElement("strong");
        b.textContent = "Title: ";
        frag.appendChild(b);
        frag.appendChild(document.createTextNode(qDisplay));
        summaryEl.appendChild(frag);

        const userId = await ensureUser();
        const qs = new URLSearchParams();
        if (title) qs.set("title", title);
        if (legacyQ) qs.set("q", legacyQ);
        else if (title) qs.set("q", title);
        qs.set("excludeUserId", userId);
        qs.set("limit", "100");

        try {
          const { shows } = await api("/api/shows/search?" + qs.toString());
          loadingEl.style.display = "none";
          if (!shows.length) {
            errEl.style.display = "block";
            errEl.textContent =
              "No new shows to add for this search — try different words, or every match is already on your list.";
            return;
          }
          document.getElementById("pageTitle").textContent = "Search results (" + shows.length + ")";
          searchResultState.allShows = shows;
          searchResultState.page = 1;
          populateNetworkFilterOptions();
          toolbar.classList.add("visible");
          const saved = localStorage.getItem(LS_SEARCH_PAGE_SIZE);
          if (saved === "10" || saved === "50" || saved === "100") {
            document.getElementById("searchPageSize").value = saved;
          }

          const filterEl = document.getElementById("searchNetworkFilter");
          const pageEl = document.getElementById("searchPageSize");
          filterEl.onchange = () => {
            searchResultState.page = 1;
            renderSearchPage(userId, errEl);
          };
          pageEl.onchange = () => {
            localStorage.setItem(LS_SEARCH_PAGE_SIZE, pageEl.value);
            searchResultState.page = 1;
            renderSearchPage(userId, errEl);
          };

          renderSearchPage(userId, errEl);
        } catch (e) {
          loadingEl.style.display = "none";
          errEl.style.display = "block";
          errEl.textContent = e.message || "Search failed.";
        }
      })();
    </script>
  </body>
</html>
